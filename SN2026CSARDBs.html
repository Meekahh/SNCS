<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numbers</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f3ef;
    color: #2c2c2a;
    display: flex;
    justify-content: center;
    padding: 60px 20px;
    min-height: 100vh;
  }
  .container {
    width: 100%;
    max-width: 480px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    margin: 0 0 32px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #ffffff;
    border: 1px solid #d8d6cc;
  }
  td {
    border: 1px solid #d8d6cc;
    text-align: center;
    padding: 14px 0;
    font-size: 17px;
    font-weight: 500;
  }
  tr:nth-child(even) {
    background: #f6f5f0;
  }
  a.num-link {
    color: #2c2c2a;
    text-decoration: none;
    display: block;
  }
  a.num-link:hover {
    color: #d85a30;
  }
  a.back-link {
    display: inline-block;
    margin-top: 24px;
    font-size: 15px;
    font-weight: 500;
    color: #2c2c2a;
    text-decoration: none;
  }
  a.back-link:hover {
    color: #d85a30;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Find the number that matches with your laptop. (SNHP__)</h1>

  }

  const tbody = document.querySelector("#numberTable tbody");
  const cols = 5;
  for (let row = 0; row < 6; row++) {
    const tr = document.createElement("tr");
    for (let col = 0; col < cols; col++) {
      const num = row * cols + col + 1;
      const td = document.createElement("td");
      const a = document.createElement("a");
      a.className = "num-link";
      a.href = links[num];
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = num;
      td.appendChild(a);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
</script>
</body>
</html>
